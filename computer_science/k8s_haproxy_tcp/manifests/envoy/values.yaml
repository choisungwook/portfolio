fullnameOverride: tcp-echo-envoy
replicaCount: 2

image:
  repository: envoyproxy/envoy
  tag: v1.38-latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  annotations: {}
  tcp:
    port: 2000
    targetPort: tcp
    nodePort: null

adminService:
  enabled: true
  type: ClusterIP
  port: 9901
  targetPort: admin

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

config: |
  admin:
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 9901

  static_resources:
    listeners:
      - name: tcp_echo_listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 2000
        filter_chains:
          - filters:
              - name: envoy.filters.network.tcp_proxy
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                  stat_prefix: tcp_echo
                  cluster: tcp_echo_cluster
                  idle_timeout: 600s
                  access_log:
                    - name: envoy.access_loggers.stdout
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog

    clusters:
      - name: tcp_echo_cluster
        connect_timeout: 5s
        type: STRICT_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: tcp_echo_cluster
          endpoints:
            - lb_endpoints:
                - endpoint:
                    address:
                      socket_address:
                        address: tcp-echo-server-headless
                        port_value: 9090
        health_checks:
          - timeout: 2s
            interval: 2s
            unhealthy_threshold: 3
            healthy_threshold: 2
            tcp_health_check: {}
        outlier_detection:
          split_external_local_origin_errors: true
          consecutive_local_origin_failure: 3
          interval: 5s
          base_ejection_time: 30s
          max_ejection_percent: 50
