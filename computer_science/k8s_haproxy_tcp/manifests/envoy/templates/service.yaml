apiVersion: v1
kind: Service
metadata:
  name: {{ include "tcp-echo-envoy.fullname" . }}
  labels:
    {{- include "tcp-echo-envoy.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "tcp-echo-envoy.selectorLabels" . | nindent 4 }}
  ports:
    - name: tcp
      port: {{ .Values.service.tcp.port }}
      targetPort: {{ .Values.service.tcp.targetPort }}
      protocol: TCP
      {{- if and (eq .Values.service.type "NodePort") .Values.service.tcp.nodePort }}
      nodePort: {{ .Values.service.tcp.nodePort }}
      {{- end }}
