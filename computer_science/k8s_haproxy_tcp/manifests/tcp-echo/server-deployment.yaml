apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-echo-server
  labels:
    app.kubernetes.io/name: tcp-echo-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: k8s-haproxy-tcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tcp-echo-server
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tcp-echo-server
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: k8s-haproxy-tcp
    spec:
      terminationGracePeriodSeconds: 35
      containers:
        - name: server
          image: choisungwook/tcp-server:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "9090"
          ports:
            - name: tcp
              containerPort: 9090
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 30
          readinessProbe:
            tcpSocket:
              port: tcp
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            tcpSocket:
              port: tcp
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
