server:
  port: 8080

spring:
  application:
    name: socket-leak
  main:
    banner-mode: off
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

db:
  url: jdbc:mariadb://${DB_HOST:mariadb}:${DB_PORT:3306}/${DB_NAME:testdb}
  user: ${DB_USER:root}
  password: ${DB_PASSWORD:password}

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: WARN
    com.example: INFO
