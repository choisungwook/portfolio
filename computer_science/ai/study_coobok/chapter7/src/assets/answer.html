<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Network AI Assistant</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }
    .question { background: #e3f2fd; padding: 12px 16px; border-radius: 6px; margin: 12px 0; }
    .answer { background: #f5f5f5; padding: 16px; border-radius: 6px; white-space: pre-wrap; margin: 12px 0; }
    a { color: #007cba; }
  </style>
</head>
<body>
  <h1>Network AI Assistant</h1>
  <div class="question"><b>질문 ({{ device_type }})</b><br />{{ question }}</div>
  <div class="answer"><b>답변</b><br />{{ answer }}</div>
  <p><a href="/">새 질문</a> · <a href="/history">기록 보기</a></p>
</body>
</html>
