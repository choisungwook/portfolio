services:
  copilot:
    build: .
    image: study-coobok/network-copilot:latest
    container_name: network-copilot
    env_file:
      - .env
    stdin_open: true
    tty: true
    volumes:
      - ./mock_data:/app/mock_data:ro
    command: ["copilot"]

  evaluate:
    extends:
      service: copilot
    container_name: network-copilot-eval
    profiles: ["eval"]
    command: ["evaluate"]
