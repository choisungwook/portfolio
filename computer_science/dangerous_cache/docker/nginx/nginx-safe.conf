# Nginx 캐시 안전한 설정
# CloudFront의 cookie_behavior="whitelist" (session_user 포함)을 재현
#
# 안전한 이유: proxy_cache_key에 session_user Cookie가 포함되어
# 사용자별로 다른 캐시 키를 가짐

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    proxy_cache_path /var/cache/nginx/api_cache levels=1:2
                    keys_zone=api_cache:10m max_size=100m
                    inactive=60s;

    server {
        listen 80;
        server_name localhost;

        # --- 정적 파일 서빙 (CloudFront → S3 역할) ---
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # --- API 리버스 프록시 + 안전한 캐싱 (CloudFront → ALB → EC2 역할) ---
        location /api/ {
            proxy_pass http://backend:5000;

            # Cookie를 백엔드로 전달
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 캐싱 활성화
            proxy_cache api_cache;
            proxy_cache_valid 200 60s;
            proxy_cache_methods GET HEAD;

            # [안전] 캐시 키에 session_user Cookie 포함 = CloudFront cookie_behavior="whitelist"
            # alice와 bob의 요청이 서로 다른 캐시 키를 가짐
            # 예: alice → ...profile_alice, bob → ...profile_bob
            proxy_cache_key "$scheme$request_method$host$request_uri$cookie_session_user";

            # Set-Cookie 헤더가 있어도 캐싱
            proxy_ignore_headers Set-Cookie;

            # 캐시 상태 헤더
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
