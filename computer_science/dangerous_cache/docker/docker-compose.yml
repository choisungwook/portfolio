services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ${NGINX_CONF:-./nginx/nginx-dangerous.conf}:/etc/nginx/nginx.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
