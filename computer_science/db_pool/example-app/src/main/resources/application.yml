spring:
  datasource:
    url: jdbc:mysql://mysql:3306/testdb?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: rootpassword
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 3000
      idle-timeout: 30000
      max-lifetime: 60000
      pool-name: HikariPool-Debug

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
