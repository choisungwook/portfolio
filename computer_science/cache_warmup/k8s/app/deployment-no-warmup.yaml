apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api-no-warmup
  labels:
    app: product-api
    variant: no-warmup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-api
      variant: no-warmup
  template:
    metadata:
      labels:
        app: product-api
        variant: no-warmup
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: product-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
