name: build-hprof-oom-analyzer

on:
  push:
    branches:
      - master
    paths:
      - 'product/hprof-oom-analyzer/**'
      - '.github/workflows/build-hprof-oom-analyzer.yml'
  pull_request:
    paths:
      - 'product/hprof-oom-analyzer/**'
      - '.github/workflows/build-hprof-oom-analyzer.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: product/hprof-oom-analyzer

jobs:
  # test는 PR 검증용으로만 실행한다. master merge 시에는 build만 실행한다.
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      # 저장소 규칙상 lock 파일을 커밋하지 않으므로 npm ci 대신 npm install을 쓴다.
      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Compile TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Smoke test CLI report
        run: |
          node dist/tools/make-sample.js sample.hprof
          node dist/cli.js sample.hprof

  build:
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build desktop app
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - uses: actions/upload-artifact@v7
        with:
          name: hprof-oom-analyzer-${{ runner.os }}
          path: product/hprof-oom-analyzer/release/*.dmg

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=hprof-oom-analyzer-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        if: steps.check.outputs.exists == 'false'
        uses: actions/download-artifact@v7
        with:
          pattern: hprof-oom-analyzer-*
          path: product/hprof-oom-analyzer/release-assets
          merge-multiple: true

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<'EOF'
          hprof-oom-analyzer ${VERSION} 데스크톱 빌드. dmg(mac) 포함.

          코드 서명이 없어 mac에서 처음 실행하면 "damaged and can't be opened" 오류가 난다. 앱 설치 후 아래 명령으로 quarantine 속성을 지우면 실행된다.

          ```bash
          xattr -cr /Applications/hprof-oom-analyzer.app
          ```
          EOF
          sed -i "s/\${VERSION}/${{ steps.version.outputs.version }}/" release-notes.md
          gh release create "${{ steps.version.outputs.tag }}" release-assets/* \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md
