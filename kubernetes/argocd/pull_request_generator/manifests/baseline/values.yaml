workload:
  name: baseline-workload
  image: pull-request-generator/pod-b:local
  imagePullPolicy: IfNotPresent
  port: 8080
  env:
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 192Mi

service:
  name: baseline-service
  port: 8080

waypoint:
  name: waypoint
