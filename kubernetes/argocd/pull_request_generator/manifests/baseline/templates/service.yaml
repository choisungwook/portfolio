apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.service.name }}"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: "{{ .Values.service.name }}"
    app.kubernetes.io/part-of: pull-request-generator-demo
    app.kubernetes.io/component: baseline
spec:
  selector:
    app.kubernetes.io/name: "{{ .Values.workload.name }}"
    app.kubernetes.io/component: baseline
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.workload.port }}
