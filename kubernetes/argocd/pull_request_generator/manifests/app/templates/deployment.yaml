apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.workload.name }}"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: "{{ .Values.workload.name }}"
    app.kubernetes.io/part-of: pull-request-generator-demo
    {{- with .Values.pullRequest.number }}
    pull-request-number: "{{ . }}"
    {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Values.workload.name }}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Values.workload.name }}"
        app.kubernetes.io/part-of: pull-request-generator-demo
        {{- with .Values.pullRequest.number }}
        pull-request-number: "{{ . }}"
        {{- end }}
    spec:
      containers:
        - name: "{{ .Values.workload.name }}"
          image: "{{ .Values.workload.image }}"
          imagePullPolicy: "{{ .Values.workload.imagePullPolicy }}"
          ports:
            - containerPort: {{ .Values.workload.port }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: "{{ .Values.service.name }}"
            - name: SERVICE_FQDN
              value: "{{ .Values.service.name }}.{{ .Release.Namespace }}.svc.cluster.local"
            - name: DESTINATION_URL
              value: "{{ .Values.workload.destinationUrl }}"
            - name: POD_B_URL
              value: "{{ .Values.workload.destinationUrl }}"
          {{- with .Values.workload.extraEnv }}
{{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
{{- toYaml .Values.workload.resources | nindent 12 }}
