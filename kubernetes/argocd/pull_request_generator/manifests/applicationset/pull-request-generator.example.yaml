apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pod-chain-pr-workload
  namespace: argocd
  labels:
    app.kubernetes.io/name: pod-chain-pr-workload
    app.kubernetes.io/part-of: pull-request-generator-demo
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - pullRequest:
        github:
          owner: "<GITHUB_OWNER>"
          repo: "<GITHUB_REPO>"
          appSecretName: github-app-repo-creds
          labels:
            - "<PULL_REQUEST_LABEL>"
        requeueAfterSeconds: 60
  template:
    metadata:
      name: "pod-chain-pr-{{.number}}"
      labels:
        app.kubernetes.io/name: pod-chain-pr-workload
        app.kubernetes.io/part-of: pull-request-generator-demo
        pull-request-number: "{{.number}}"
    spec:
      project: default
      source:
        repoURL: "https://github.com/<MANIFEST_OWNER>/<MANIFEST_REPO>.git"
        targetRevision: main
        path: kubernetes/argocd/pull_request_generator/manifests/app
        helm:
          releaseName: "workload-{{.number}}"
          parameters:
            - name: pullRequest.number
              value: "{{.number}}"
            - name: workload.name
              value: "<WORKLOAD_NAME>"
            - name: workload.image
              value: "choisunguk/pull-request-generator:v1"
            - name: service.name
              value: "<SERVICE_NAME>"
            # Optional mesh HTTPRoute. Uncomment only when this PR should catch
            # header-matched calls to the prod Service FQDN through waypoint.
            # - name: httpRoute.enabled
            #   value: "true"
            # - name: httpRoute.name
            #   value: "app-route-pr-{{.number}}"
            # - name: httpRoute.namespace
            #   value: "prod"
            # - name: httpRoute.parentRef.kind
            #   value: "Service"
            # - name: httpRoute.parentRef.name
            #   value: "app-service"
            # - name: httpRoute.parentRef.namespace
            #   value: "prod"
            # - name: httpRoute.header.enabled
            #   value: "true"
            # - name: httpRoute.header.name
            #   value: "cookie"
            # - name: httpRoute.header.value
            #   value: "(^|.*; )pod-chain-pr={{.number}}(;.*|$)"
      destination:
        server: https://kubernetes.default.svc
        namespace: "pr-{{.number}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            app.kubernetes.io/name: "pr-{{.number}}"
            app.kubernetes.io/part-of: pull-request-generator-demo
            istio.io/dataplane-mode: ambient
            istio.io/use-waypoint: waypoint
            istio.io/use-waypoint-namespace: istio-waypoint
        syncOptions:
          - CreateNamespace=true
