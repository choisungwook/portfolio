apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b-pr-101
  namespace: pr-preview
  labels:
    app.kubernetes.io/name: service-b
    app.kubernetes.io/instance: pr-101
    app.kubernetes.io/part-of: pr-preview-kind
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: service-b
      app.kubernetes.io/instance: pr-101
  template:
    metadata:
      labels:
        app.kubernetes.io/name: service-b
        app.kubernetes.io/instance: pr-101
        app.kubernetes.io/part-of: pr-preview-kind
    spec:
      containers:
        - name: service-b
          image: pr-preview/service-b:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: service-b
            - name: SERVICE_VERSION
              value: pr-101
            - name: SERVICE_C_URL
              value: http://service-c-pr-101:8080/finish
            - name: ZIPKIN_URL
              value: http://zipkin:9411/api/v2/spans
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
