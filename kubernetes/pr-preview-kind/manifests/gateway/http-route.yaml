apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pr-preview-route
  namespace: pr-preview
  labels:
    app.kubernetes.io/name: pr-preview-route
    app.kubernetes.io/part-of: pr-preview-kind
spec:
  parentRefs:
    - name: pr-preview-gateway
  hostnames:
    - preview.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: x-pr-preview
              type: Exact
              value: pr-101
      backendRefs:
        - name: service-a-pr-101
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: service-a-main
          port: 8080
