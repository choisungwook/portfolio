apiVersion: v1
kind: Pod
metadata:
  name: userns-root-pod
  labels:
    app.kubernetes.io/name: userns-root-pod
spec:
  hostUsers: false
  restartPolicy: Never
  containers:
  - name: shell
    image: busybox:1.36.1
    command:
    - sh
    - -c
    - id && sleep 3600
    securityContext:
      runAsUser: 0
      runAsGroup: 0
    resources:
      requests:
        cpu: 5m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 64Mi
