name: Release

on:
  push:
    tags:
      - "akbun-gitui-v*"

permissions:
  contents: write

defaults:
  run:
    working-directory: product/akbun-gitui

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tui:
    name: Build TUI - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: akbun-gitui-tui-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: akbun-gitui-tui-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: akbun-gitui-tui-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: akbun-gitui-tui-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: akbun-gitui-tui-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev pkg-config

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: product/akbun-gitui

      - name: Build TUI
        run: cargo build -p gitui-tui --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/akbun-gitui-tui ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/akbun-gitui-tui.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: product/akbun-gitui/${{ matrix.artifact }}

  build-desktop:
    name: Build Desktop - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_pattern: "crates/gitui-desktop/target/release/bundle/deb/*.deb"
            artifact_name: akbun-gitui-desktop-linux
          - os: macos-latest
            artifact_pattern: "crates/gitui-desktop/target/release/bundle/dmg/*.dmg"
            artifact_name: akbun-gitui-desktop-macos
          - os: windows-latest
            artifact_pattern: "crates/gitui-desktop/target/release/bundle/nsis/*.exe"
            artifact_name: akbun-gitui-desktop-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: product/akbun-gitui

      - name: Install frontend dependencies
        working-directory: product/akbun-gitui/frontend
        run: npm ci

      - name: Build frontend
        working-directory: product/akbun-gitui/frontend
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: product/akbun-gitui/crates/gitui-desktop
        run: cargo tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: product/akbun-gitui/${{ matrix.artifact_pattern }}

  release:
    name: Create Release
    needs: [build-tui, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
