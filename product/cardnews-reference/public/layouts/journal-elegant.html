<!--
  Layout: 저널 감성형
  Type: journal-elegant
  Purpose: 크림/베이지 배경에 세리프풍 텍스트. 에세이, 감성 글귀, 자기계발 메시지에 적합. 줄 사이 구분선.
  Card-size: 1080x1350px (4:5)
  Font-size: 36px-44px 권장
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal Elegant Layout — 저널 감성형</title>
  <style>
    :root {
      --base-font-size: 40px;
      --background: #E8E4DC;
      --text: #4A5240;
      --text-secondary: #7A7A6E;
      --divider: #C5C0B6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: var(--base-font-size);
      color: var(--text);
      background: #FFFFFF;
    }

    /* 카드 컨테이너 — 4:5 비율 고정 */
    .card {
      width: 1080px;
      height: 1350px;
      margin: 2rem auto;
      background: var(--background);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-bottom: 80px;
      overflow: hidden;
    }

    /* 상단 아이콘 영역 */
    .icon-area {
      padding: 0 100px;
    }

    .pen-icon {
      font-size: 60px;
      line-height: 1;
    }

    /* 본문 영역 */
    .content {
      padding: 30px 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .line-group {
      display: flex;
      flex-direction: column;
    }

    .line-text {
      font-size: 1em;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      padding: 28px 0;
      letter-spacing: -0.02em;
    }

    /* 줄 사이 구분선 */
    .line-divider {
      width: 100%;
      height: 1px;
      background: var(--divider);
    }

    .attribution {
      position: absolute;
      top: 32px;
      left: 40px;
      font-size: 0.57em;
      color: var(--text-secondary);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="download-area">
    <button class="download-btn" onclick="downloadCard()">PNG 다운로드 (1080 × 1350)</button>
  </div>
  <div class="card">
    <div class="icon-area">
      <div class="pen-icon">&#9997;</div>
    </div>
    <div class="content">
      <div class="line-group">
        <div class="line-text">천천히 가더라도</div>
        <div class="line-divider"></div>
        <div class="line-text">방향이 맞다면</div>
        <div class="line-divider"></div>
        <div class="line-text">충분히 빠른 겁니다.</div>
        <div class="line-divider"></div>
        <div class="line-text">멈추지 않는 한</div>
        <div class="line-divider"></div>
        <div class="line-text">늦은 건 아닙니다.</div>
        <div class="line-divider"></div>
      </div>
    </div>
    <div class="attribution">@akbun card news</div>
  </div>
  <style>
    .download-area {
      text-align: center;
      padding: 24px;
    }
    .download-btn {
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      color: #FFFFFF;
      background: #1A1A1A;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .download-btn:hover { background: #333333; }
  </style>
  <script>
    async function downloadCard() {
      try {
        if (typeof html2canvas === 'undefined') {
          await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });
        }
        const canvas = await html2canvas(document.querySelector('.card'), { width: 1080, height: 1350, scale: 1 });
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = 'cardnews.png';
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
        }, 'image/png');
      } catch (err) {
        console.error('Download failed:', err);
        alert('PNG 다운로드에 실패했습니다. 다시 시도해주세요.');
      }
    }
  </script>
</body>
</html>
