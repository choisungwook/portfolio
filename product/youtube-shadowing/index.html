<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Shadowing - 영어 쉐도잉 연습</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 상단 네비게이션 -->
  <nav class="navbar">
    <div class="navbar-brand" id="navBrand">
      <span class="navbar-icon">🎧</span>
      <span>YouTube Shadowing</span>
    </div>
    <button class="btn btn-nav" id="btnNewVideo">영상 입력하기</button>
  </nav>

  <!-- 메인 화면: 영상 입력 -->
  <main id="mainView" class="view">
    <div class="hero">
      <h1>YouTube 영상으로<br>영어 쉐도잉 연습</h1>
      <p class="hero-sub">YouTube 영상 URL을 입력하면 쉐도잉에 최적화된 플레이어가 나옵니다.</p>
      <form id="urlForm" class="url-form">
        <input
          type="text"
          id="urlInput"
          class="url-input"
          placeholder="YouTube URL을 붙여넣으세요"
          autocomplete="off"
          required
        >
        <button type="submit" class="btn btn-primary">시작</button>
      </form>
      <p class="url-hint">예: https://www.youtube.com/watch?v=dQw4w9WgXcQ</p>
    </div>
  </main>

  <!-- 쉐도잉 화면 -->
  <main id="playerView" class="view hidden">
    <div class="player-container">
      <!-- YouTube Player -->
      <div class="video-wrapper">
        <div id="ytPlayer"></div>
      </div>

      <!-- 재생 컨트롤 -->
      <div class="controls">
        <div class="seek-controls">
          <button class="btn btn-control" data-seek="-10">◀◀ 10s</button>
          <button class="btn btn-control" data-seek="-5">◀◀ 5s</button>
          <button class="btn btn-control" data-seek="-3">◀◀ 3s</button>
          <button class="btn btn-control" data-seek="-1">◀◀ 1s</button>
          <button class="btn btn-control btn-play" id="btnPlayPause">▶</button>
          <button class="btn btn-control" data-seek="1">1s ▶▶</button>
          <button class="btn btn-control" data-seek="3">3s ▶▶</button>
          <button class="btn btn-control" data-seek="5">5s ▶▶</button>
          <button class="btn btn-control" data-seek="10">10s ▶▶</button>
        </div>

        <div class="speed-controls">
          <span class="speed-label">속도:</span>
          <button class="btn btn-speed" data-speed="0.25">0.25x</button>
          <button class="btn btn-speed" data-speed="0.5">0.5x</button>
          <button class="btn btn-speed" data-speed="0.75">0.75x</button>
          <button class="btn btn-speed active" data-speed="1">1x</button>
          <button class="btn btn-speed" data-speed="1.25">1.25x</button>
          <button class="btn btn-speed" data-speed="1.5">1.5x</button>
          <button class="btn btn-speed" data-speed="2">2x</button>
        </div>
      </div>

      <!-- 녹음 섹션 -->
      <div class="recorder-section">
        <h2 class="section-title">🎤 녹음</h2>
        <div class="recorder-controls">
          <button class="btn btn-record" id="btnRecord">🎤 녹음 시작</button>
          <button class="btn btn-stop hidden" id="btnStopRecord">⏹ 녹음 정지</button>
          <span class="recording-time hidden" id="recordingTime">00:00</span>
        </div>
        <div id="recordingsList" class="recordings-list"></div>
      </div>

      <!-- 키보드 단축키 안내 -->
      <div class="shortcuts-info">
        <details>
          <summary>⌨️ 키보드 단축키</summary>
          <div class="shortcuts-grid">
            <div><kbd>Space</kbd> 재생/일시정지</div>
            <div><kbd>←</kbd> 5초 되감기</div>
            <div><kbd>→</kbd> 5초 앞으로</div>
            <div><kbd>Shift</kbd>+<kbd>←</kbd> 1초 되감기</div>
            <div><kbd>Shift</kbd>+<kbd>→</kbd> 1초 앞으로</div>
            <div><kbd>-</kbd> 속도 감소</div>
            <div><kbd>+</kbd> <kbd>=</kbd> 속도 증가</div>
            <div><kbd>R</kbd> 녹음 시작/정지</div>
          </div>
        </details>
      </div>
    </div>
  </main>

  <script src="js/player.js"></script>
  <script src="js/recorder.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
